name: Python Tests CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: true
        default: 'all'
        type: choice
        options: [all, api, ui]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  TEAMCITY_SERVER_IMAGE: 'jetbrains/teamcity-server:2025.11.2'
  TEAMCITY_AGENT_IMAGE: 'jetbrains/teamcity-agent:2025.11.2'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install flake8 black isort

      - name: black
        run: black --check .

      - name: isort
        run: isort --check-only .

      - name: flake8
        run: flake8 .

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    if: |
      github.event.inputs.suite == '' ||
      github.event.inputs.suite == 'all' ||
      github.event.inputs.suite == 'api' ||
      github.event.inputs.suite == 'ui'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Restore TeamCity Docker image cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/docker-cache/teamcity
          key: teamcity-images-${{ runner.os }}-${{ hashFiles('infra/docker_compose/docker-compose.yml') }}

      - name: Ensure TeamCity images
        env:
          TEAMCITY_SERVER_IMAGE: ${{ env.TEAMCITY_SERVER_IMAGE }}
          TEAMCITY_AGENT_IMAGE: ${{ env.TEAMCITY_AGENT_IMAGE }}
          TEAMCITY_IMAGE_CACHE_DIR: ${{ runner.temp }}/docker-cache/teamcity
        run: bash scripts/ensure_teamcity_images.sh

      - name: Install dependencies
        run: bash scripts/install_deps.sh

      - name: Debug runner and Docker context
        run: |
          DEBUG_DIR="${RUNNER_TEMP}/teamcity-tests-debug"
          mkdir -p "${DEBUG_DIR}"
          echo "DEBUG_DIR=${DEBUG_DIR}" >> "$GITHUB_ENV"
          echo "RUNTIME_ENV_FILE=${RUNNER_TEMP}/teamcity-runtime.env" >> "$GITHUB_ENV"
          echo "Runner: $RUNNER_NAME"
          echo "OS: $RUNNER_OS"
          echo "Arch: $RUNNER_ARCH"
          echo "RUNNER_TEMP: $RUNNER_TEMP"
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "PWD: $(pwd)"
          echo "Disk usage:"
          df -h
          echo "Docker version:"
          docker version
          echo "Docker compose version:"
          docker compose version
          echo "Seed archive:"
          ls -lah infra/teamcity_seed
          echo "Docker cache directory:"
          ls -lah "${RUNNER_TEMP}/docker-cache/teamcity" || true

      - name: Start TeamCity infrastructure
        id: start_infra
        run: |
          DEBUG_DIR="${DEBUG_DIR:-${RUNNER_TEMP}/teamcity-tests-debug}"
          RUNTIME_ENV_FILE="${TEAMCITY_RUNTIME_ENV_FILE:-${RUNTIME_ENV_FILE:-${RUNNER_TEMP}/teamcity-runtime.env}}"

          load_runtime_env() {
            if [ -f "${RUNTIME_ENV_FILE}" ]; then
              # shellcheck disable=SC1090
              . "${RUNTIME_ENV_FILE}"
            fi
          }

          print_debug() {
            local stamp
            stamp="$(date -u +%Y%m%dT%H%M%SZ)"
            mkdir -p "${DEBUG_DIR}"
            load_runtime_env
            echo "===== TeamCity startup debug ====="
            date -u
            echo "RUNTIME_ENV_FILE=${RUNTIME_ENV_FILE}"
            echo "RUNNER_TEMP=${RUNNER_TEMP}"
            echo "TEAMCITY_RUNTIME_DIR=${TEAMCITY_RUNTIME_DIR:-}"
            echo "TEAMCITY_SERVER_DATADIR=${TEAMCITY_SERVER_DATADIR:-}"
            echo "TEAMCITY_SERVER_LOGS=${TEAMCITY_SERVER_LOGS:-}"
            echo "Docker containers:"
            docker ps -a | tee "${DEBUG_DIR}/docker-ps-${stamp}.log" || true
            echo "Docker images:"
            docker image ls | grep teamcity | tee "${DEBUG_DIR}/docker-images-${stamp}.log" || true
            echo "Docker cache files:"
            ls -lah "${RUNNER_TEMP}/docker-cache/teamcity" | tee "${DEBUG_DIR}/docker-cache-${stamp}.log" || true
            echo "Compose ps:"
            docker compose -f infra/docker_compose/docker-compose.yml ps | tee "${DEBUG_DIR}/compose-ps-${stamp}.log" || true
            echo "Docker inspect teamcity-server:"
            docker inspect -f 'status={{.State.Status}} restarts={{.RestartCount}} exitCode={{.State.ExitCode}} error={{.State.Error}} startedAt={{.State.StartedAt}} finishedAt={{.State.FinishedAt}}' teamcity-server | tee "${DEBUG_DIR}/teamcity-server-inspect-${stamp}.log" || true
            echo "Docker inspect teamcity-agent-01:"
            docker inspect -f 'status={{.State.Status}} restarts={{.RestartCount}} exitCode={{.State.ExitCode}} error={{.State.Error}} startedAt={{.State.StartedAt}} finishedAt={{.State.FinishedAt}}' teamcity-agent-01 | tee "${DEBUG_DIR}/teamcity-agent-inspect-${stamp}.log" || true
            echo "Runtime env file contents:"
            cat "${RUNTIME_ENV_FILE}" | tee "${DEBUG_DIR}/runtime-env-${stamp}.log" || true
            echo "Runtime directory contents:"
            if [ -n "${TEAMCITY_RUNTIME_DIR:-}" ] && [ -d "${TEAMCITY_RUNTIME_DIR}" ]; then
              echo "Runtime directory permissions:"
              ls -ld "${TEAMCITY_RUNTIME_DIR}" "${TEAMCITY_SERVER_DATADIR}" "${TEAMCITY_SERVER_LOGS}" | tee "${DEBUG_DIR}/runtime-permissions-${stamp}.log" || true
              find "${TEAMCITY_RUNTIME_DIR}" -maxdepth 3 -type f | sort | tee "${DEBUG_DIR}/runtime-files-${stamp}.log" || true
              echo "Datadir root:"
              ls -lah "${TEAMCITY_SERVER_DATADIR}" | tee "${DEBUG_DIR}/datadir-root-${stamp}.log" || true
              echo "Logs root:"
              ls -lah "${TEAMCITY_SERVER_LOGS}" | tee "${DEBUG_DIR}/logs-root-${stamp}.log" || true
            fi
            echo "HTTP probe /:"
            curl -I --max-time 10 http://localhost:8111/ | tee "${DEBUG_DIR}/http-root-${stamp}.log" || true
            echo "HTTP probe /login.html:"
            curl -I --max-time 10 http://localhost:8111/login.html | tee "${DEBUG_DIR}/http-login-${stamp}.log" || true
            echo "HTTP probe /app/rest/server with basic auth:"
            curl -I --max-time 10 -u admin:admin http://localhost:8111/app/rest/server | tee "${DEBUG_DIR}/http-rest-${stamp}.log" || true
            echo "Docker logs teamcity-server:"
            docker logs --tail 100 teamcity-server 2>&1 | tee "${DEBUG_DIR}/teamcity-server-docker-log-${stamp}.log" || true
            echo "Docker logs teamcity-agent-01:"
            docker logs --tail 100 teamcity-agent-01 2>&1 | tee "${DEBUG_DIR}/teamcity-agent-docker-log-${stamp}.log" || true

            if [ -n "${TEAMCITY_SERVER_LOGS:-}" ] && [ -d "${TEAMCITY_SERVER_LOGS}" ]; then
              echo "TeamCity log files:"
              find "${TEAMCITY_SERVER_LOGS}" -maxdepth 2 -type f | sort | tee "${DEBUG_DIR}/teamcity-log-files-${stamp}.log" || true
              echo "teamcity-server.log tail:"
              tail -n 100 "${TEAMCITY_SERVER_LOGS}/teamcity-server.log" | tee "${DEBUG_DIR}/teamcity-server-log-tail-${stamp}.log" || true
            fi
          }

          (
            while true; do
              sleep 30
              print_debug
            done
          ) &
          DEBUG_PID=$!

          cleanup() {
            kill "${DEBUG_PID}" >/dev/null 2>&1 || true
          }

          trap cleanup EXIT
          print_debug
          bash scripts/start_infra.sh

      - name: Debug TeamCity state after startup attempt
        if: always()
        run: |
          DEBUG_DIR="${DEBUG_DIR:-${RUNNER_TEMP}/teamcity-tests-debug}"
          RUNTIME_ENV_FILE="${TEAMCITY_RUNTIME_ENV_FILE:-${RUNTIME_ENV_FILE:-${RUNNER_TEMP}/teamcity-runtime.env}}"
          if [ -f "${RUNTIME_ENV_FILE}" ]; then
            # shellcheck disable=SC1090
            . "${RUNTIME_ENV_FILE}"
          fi
          echo "Docker containers:"
          docker ps -a
          echo "Compose ps:"
          docker compose -f infra/docker_compose/docker-compose.yml ps || true
          echo "Runtime env file:"
          cat "${RUNTIME_ENV_FILE}" || true
          echo "Runtime directory: ${TEAMCITY_RUNTIME_DIR:-}"
          echo "Server datadir: ${TEAMCITY_SERVER_DATADIR:-}"
          echo "Server logs: ${TEAMCITY_SERVER_LOGS:-}"
          if [ -n "${TEAMCITY_RUNTIME_DIR:-}" ] && [ -d "${TEAMCITY_RUNTIME_DIR}" ]; then
            echo "Runtime directory permissions:"
            ls -ld "${TEAMCITY_RUNTIME_DIR}" "${TEAMCITY_SERVER_DATADIR}" "${TEAMCITY_SERVER_LOGS}" || true
            echo "Runtime contents:"
            find "${TEAMCITY_RUNTIME_DIR}" -maxdepth 3 -type f | sort || true
          fi
          echo "HTTP probe /:"
          curl -I --max-time 10 http://localhost:8111/ || true
          echo "HTTP probe /login.html:"
          curl -I --max-time 10 http://localhost:8111/login.html || true
          echo "HTTP probe /app/rest/server with basic auth:"
          curl -I --max-time 10 -u admin:admin http://localhost:8111/app/rest/server || true
          echo "Docker inspect teamcity-server:"
          docker inspect -f 'status={{.State.Status}} restarts={{.RestartCount}} exitCode={{.State.ExitCode}} error={{.State.Error}} startedAt={{.State.StartedAt}} finishedAt={{.State.FinishedAt}}' teamcity-server || true
          mkdir -p "${DEBUG_DIR}"
          docker ps -a > "${DEBUG_DIR}/docker-ps-final.log" 2>&1 || true
          docker compose -f infra/docker_compose/docker-compose.yml ps > "${DEBUG_DIR}/compose-ps-final.log" 2>&1 || true
          docker inspect teamcity-server > "${DEBUG_DIR}/teamcity-server-inspect-final.json" 2>&1 || true
          docker inspect teamcity-agent-01 > "${DEBUG_DIR}/teamcity-agent-inspect-final.json" 2>&1 || true

      - name: Dump TeamCity logs on failure
        if: failure()
        run: |
          DEBUG_DIR="${DEBUG_DIR:-${RUNNER_TEMP}/teamcity-tests-debug}"
          RUNTIME_ENV_FILE="${TEAMCITY_RUNTIME_ENV_FILE:-${RUNTIME_ENV_FILE:-${RUNNER_TEMP}/teamcity-runtime.env}}"
          mkdir -p "${DEBUG_DIR}"
          echo "Compose logs:"
          docker compose -f infra/docker_compose/docker-compose.yml logs --tail=200 | tee "${DEBUG_DIR}/compose-logs-tail.log" || true
          echo "Docker logs teamcity-server:"
          docker logs teamcity-server 2>&1 | tee "${DEBUG_DIR}/teamcity-server-docker.log" || true
          echo "Docker logs teamcity-agent-01:"
          docker logs teamcity-agent-01 2>&1 | tee "${DEBUG_DIR}/teamcity-agent-docker.log" || true
          if [ -f "${RUNTIME_ENV_FILE}" ]; then
            # shellcheck disable=SC1090
            . "${RUNTIME_ENV_FILE}"
            echo "TeamCity server logs directory: ${TEAMCITY_SERVER_LOGS}"
            find "${TEAMCITY_SERVER_LOGS}" -maxdepth 2 -type f | sort | tee "${DEBUG_DIR}/teamcity-runtime-log-files.log" || true
            echo "teamcity-server.log tail:"
            tail -n 200 "${TEAMCITY_SERVER_LOGS}/teamcity-server.log" | tee "${DEBUG_DIR}/teamcity-server-runtime-tail.log" || true
            cp -R "${TEAMCITY_SERVER_LOGS}" "${DEBUG_DIR}/runtime-logs" || true
          fi

      - name: Upload TeamCity diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: teamcity-debug-${{ github.run_number }}
          path: ${{ runner.temp }}/teamcity-tests-debug
          retention-days: 14

      - name: Run API tests
        if: |
          steps.start_infra.outcome == 'success' &&
          (
            github.event.inputs.suite == '' ||
            github.event.inputs.suite == 'all' ||
            github.event.inputs.suite == 'api'
          )
        env:
          TC_ADMIN_BEARERTOKEN: ${{ secrets.TC_ADMIN_BEARERTOKEN }}
        run: bash scripts/run_api_tests.sh

      - name: Upload API report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-report-${{ github.run_number }}
          path: reports/api/
          retention-days: 14
          if-no-files-found: ignore

      - name: Run UI tests
        if: |
          always() &&
          steps.start_infra.outcome == 'success' &&
          (
            github.event.inputs.suite == '' ||
            github.event.inputs.suite == 'all' ||
            github.event.inputs.suite == 'ui'
          )
        env:
          TC_ADMIN_BEARERTOKEN: ${{ secrets.TC_ADMIN_BEARERTOKEN }}
        run: bash scripts/run_ui_tests.sh

      - name: Stop infrastructure
        if: always()
        run: bash scripts/stop_infra.sh

      - name: Upload UI report + screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-report-${{ github.run_number }}
          path: |
            reports/ui/
            screenshots/
          retention-days: 14
          if-no-files-found: ignore

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [tests]
    if: always()
    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          pattern: '*-report-*'
          merge-multiple: true
          path: all-reports/

      - name: Publish results to GitHub checks
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: 'all-reports/**/*.xml'
          comment_title: 'Test Results'
          check_name: 'Test Results'

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [tests]
    if: always()
    steps:
      - name: Resolve status
        id: status
        run: |
          TESTS="${{ needs.tests.result }}"

          if [[ "$TESTS" == "failure" ]]; then
            echo "status=FAILED" >> "$GITHUB_OUTPUT"
          elif [[ "$TESTS" == "cancelled" ]]; then
            echo "status=CANCELLED" >> "$GITHUB_OUTPUT"
          else
            echo "status=PASSED" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Telegram notification
        run: |
          MESSAGE="TeamCity tests ${{ steps.status.outputs.status }}

          Branch: ${{ github.ref_name }}
          Triggered by: ${{ github.actor }}
          Event: ${{ github.event_name }}
          Suite: ${{ github.event.inputs.suite || 'all' }}

          Results:
          - Combined Tests Job: ${{ needs.tests.result }}

          View run #${{ github.run_number }}: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=${MESSAGE}" \
            --data-urlencode "disable_web_page_preview=true"
